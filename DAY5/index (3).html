<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Directory</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            background-color: #f0f2f5;
        }
        .directory-header {
            background-color: #2f3e6e;
            color: rgb(253, 249, 249);
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .learner-card {
            border-radius: 10px;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
        }
        .serial-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #2f3e6e;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
        }
        .card-alt {
            background-color: #eef1fa;
        }
        .cgpa-high {
            background-color: #1e7e34;
        }
        .cgpa-normal {
            background-color: #6c757d;
        }
        .learner-details {
            display: none;
            border-top: 1px solid #ddd;
            margin-top: 10px;
            padding-top: 10px;
        }
        .toggle-btn {
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>

<div class="directory-header text-center">
    <h1>Batch Directory</h1>
    <p class="mb-0">Search and explore learner profiles</p>
</div>

<div class="container pb-5">

    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <input type="text" id="searchBox" class="form-control" placeholder="Search learners by name...">
        </div>
    </div>

    <p class="text-center text-muted" id="totalCount"></p>

    <div class="row g-4" id="directoryContainer"></div>

</div>

<script>
    // ===== Data: Array of Objects =====
    const learners = [
        { name: "Simran Kaur", branch: "CSE", cgpa: 9.2, city: "Jaipur", email: "simran@example.com" },
        { name: "Aditya Rao", branch: "IT", cgpa: 7.6, city: "Bengaluru", email: "aditya@example.com" },
        { name: "Farhan Ali", branch: "ECE", cgpa: 8.9, city: "Lucknow", email: "farhan@example.com" },
        { name: "Meera Nair", branch: "CSE", cgpa: 8.1, city: "Kochi", email: "meera@example.com" },
        { name: "Rohan Deshmukh", branch: "Mechanical", cgpa: 7.3, city: "Pune", email: "rohan@example.com" },
        { name: "Zara Sheikh", branch: "IT", cgpa: 9.5, city: "Hyderabad", email: "zara@example.com" }
    ];

    const directoryContainer = $("#directoryContainer");
    const totalCount = $("#totalCount");

    // ===== Render function: builds cards using a loop =====
    function renderLearners(data) {
        let html = "";

        data.forEach((learner, index) => {
            const cardBg = index % 2 === 0 ? "" : "card-alt";
            const cgpaBadgeClass = learner.cgpa > 8 ? "cgpa-high" : "cgpa-normal";

            html += `
                <div class="col-md-4">
                    <div class="card learner-card ${cardBg} p-3">
                        <span class="serial-badge">${index + 1}</span>
                        <h5 class="mt-3">${learner.name}</h5>
                        <p class="mb-1">${learner.branch} &middot; ${learner.city}</p>
                        <span class="badge ${cgpaBadgeClass}">CGPA ${learner.cgpa}</span>

                        <button class="btn btn-outline-primary btn-sm toggle-btn mt-3">Show Details</button>

                        <div class="learner-details">
                            <p class="mb-0">Email: ${learner.email}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        directoryContainer.html(html);
        totalCount.text(`You have ${data.length} learner${data.length !== 1 ? "s" : ""} in this batch.`);
    }

    // ===== Search filter =====
    $("#searchBox").on("keyup", function () {
        const query = $(this).val().toLowerCase();
        const filtered = learners.filter(learner =>
            learner.name.toLowerCase().includes(query)
        );
        renderLearners(filtered);
    });

    // ===== Show/Hide details (event delegation, since cards are dynamic) =====
    $(document).on("click", ".toggle-btn", function () {
        const $btn = $(this);
        const $details = $btn.closest(".learner-card").find(".learner-details");

        $details.slideToggle();

        if ($btn.text() === "Show Details") {
            $btn.text("Hide Details");
            $btn.css("background-color", "#2f3e6e");
            $btn.css("color", "white");
        } else {
            $btn.text("Show Details");
            $btn.css("background-color", "");
            $btn.css("color", "");
        }
    });

    // ===== Initial render, with a fade-in on load =====
    renderLearners(learners);
    directoryContainer.hide().fadeIn(600);
</script>

</body>
</html>
